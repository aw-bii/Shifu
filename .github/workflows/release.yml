name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    # Target platforms: Windows and macOS only (Linux is out of scope for v1)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add these secrets in repo Settings → Secrets and variables → Actions:
          # macOS notarization:
          #   CSC_LINK           — base64-encoded .p12 Developer ID cert
          #   CSC_KEY_PASSWORD   — cert password
          #   APPLE_ID           — your Apple ID email
          #   APPLE_APP_SPECIFIC_PASSWORD — app-specific password (appleid.apple.com)
          #   APPLE_TEAM_ID      — 10-char team ID (developer.apple.com)
          # Windows code signing:
          #   WIN_CSC_LINK       — base64-encoded .p12 EV cert
          #   WIN_CSC_KEY_PASSWORD — cert password
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: dist/*.{exe,dmg,zip}
          if-no-files-found: warn

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true

      - name: Generate release notes
        run: |
          echo "## BII Agent Harness Release" > release-notes.md
          echo "" >> release-notes.md
          echo "Download the installer for your platform below." >> release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          name: BII Agent Harness ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            *.exe
            *.dmg
            *.AppImage
            *.deb
            *.rpm
